name: quill_keys
description: "Vim-style modal keybinding package for Flutter — modes, chords, hints, TOML config."
version: 1.0.1
repository: https://gitlab.com/ninthhouse/quill.git

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  toml: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.30.0
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
